name: Copilot fix failed CI

on:
  workflow_call:
    inputs:
      watched_workflow_name:
        required: true
        type: string
      reviewer:
        required: true
        type: string
      base_branch:
        required: false
        type: string
        default: main
    secrets:
      GH_PAT:
        required: true

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  create-copilot-task:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.name == inputs.watched_workflow_name

    steps:
      - name: Build issue body
        id: body
        shell: bash
        run: |
          cat > body.md <<'EOF'
          CI failed for `${{ github.repository }}`.

          Please investigate the failing workflow run and open a PR with a proposed fix.

          Context:
          - Workflow: ${{ github.event.workflow_run.name }}
          - Conclusion: ${{ github.event.workflow_run.conclusion }}
          - Branch: ${{ github.event.workflow_run.head_branch }}
          - Commit SHA: ${{ github.event.workflow_run.head_sha }}
          - Run URL: ${{ github.event.workflow_run.html_url }}

          Requirements:
          - Fix the root cause of the failing CI run.
          - Keep the change minimal.
          - Do not broaden scope beyond fixing the failure.
          - After changes, ensure the relevant tests/build pass.
          - Open a pull request targeting `${{ inputs.base_branch }}`.
          - Request review from @${{ inputs.reviewer }} when the PR is ready.
          - If review changes are requested, address only those comments with minimal follow-up commits.
          EOF

          {
            echo 'issue_body<<EOF'
            cat body.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create issue assigned to Copilot
        id: create_issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        shell: bash
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/issues" \
            --input - <<EOF > response.json
          {
            "title": "Auto-fix CI failure: ${{ github.event.workflow_run.name }} (${{ github.event.workflow_run.head_sha }})",
            "body": ${{ toJson(steps.body.outputs.issue_body) }},
            "labels": ["copilot", "ci-failure", "auto-fix"],
            "assignees": ["copilot-swe-agent[bot]"],
            "agent_assignment": {
              "target_repo": "${{ github.repository }}",
              "base_branch": "${{ inputs.base_branch }}",
              "custom_instructions": "Focus only on fixing this CI failure. Keep the PR small. Do not refactor unrelated code. Add or update tests only if needed for the fix. When the PR is ready, request review from @${{ inputs.reviewer }}. If review changes are requested, address only those comments with minimal follow-up commits.",
              "custom_agent": "",
              "model": ""
            }
          }
          EOF

          echo "issue_number=$(jq -r '.number' response.json)" >> "$GITHUB_OUTPUT"
