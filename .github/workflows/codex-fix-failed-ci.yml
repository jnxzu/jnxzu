name: Codex fix failed CI

on:
  workflow_call:
    inputs:
      watched_workflow_name:
        required: true
        type: string
      reviewer:
        required: true
        type: string
      base_branch:
        required: false
        type: string
        default: main
    secrets:
      GH_PAT:
        required: true

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  create-codex-task:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.name == inputs.watched_workflow_name

    steps:
      - name: Build issue body
        id: body
        shell: bash
        run: |
          cat > body.md <<'EOF'
          CI failed and needs a minimal fix PR.

          Context:
          - Repository: `${{ github.repository }}`
          - Workflow: `${{ github.event.workflow_run.name }}`
          - Conclusion: `${{ github.event.workflow_run.conclusion }}`
          - Branch: `${{ github.event.workflow_run.head_branch }}`
          - Commit SHA: `${{ github.event.workflow_run.head_sha }}`
          - Run URL: ${{ github.event.workflow_run.html_url }}
          - PR target branch: `${{ inputs.base_branch }}`
          - Reviewer: @${{ inputs.reviewer }}

          Requirements:
          - Fix the root cause of the failing CI run.
          - Keep the change minimal and scoped only to the failure.
          - Do not refactor unrelated code.
          - Run or update the relevant checks when possible.
          - Open a pull request targeting `${{ inputs.base_branch }}`.
          - Request review from @${{ inputs.reviewer }} when the PR is ready.
          - If review changes are requested, address only those comments with minimal follow-up commits.
          EOF

          {
            echo 'issue_body<<EOF'
            cat body.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create Codex issue
        id: create_issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        shell: bash
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/issues" \
            --input - <<'EOF' > response.json
          {
            "title": "Codex auto-fix CI failure: ${{ github.event.workflow_run.name }} (${{ github.event.workflow_run.head_sha }})",
            "body": ${{ toJson(steps.body.outputs.issue_body) }},
            "assignees": ["${{ inputs.reviewer }}"]
          }
          EOF

          echo "issue_number=$(jq -r '.number' response.json)" >> "$GITHUB_OUTPUT"

      - name: Ask Codex to open a PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        shell: bash
        run: |
          cat > comment.md <<'EOF'
          @codex Please fix this CI failure and open a minimal pull request.

          Use the issue description for the failing workflow run, target branch, and constraints. Keep the change scoped to the CI failure only.
          EOF

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/issues/${{ steps.create_issue.outputs.issue_number }}/comments" \
            -f body="$(cat comment.md)"
