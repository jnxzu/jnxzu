name: Codex fix failed CI

on:
  workflow_call:
    inputs:
      watched_workflow_name:
        required: true
        type: string
      reviewer:
        required: true
        type: string
      base_branch:
        required: false
        type: string
        default: main
    secrets:
      GH_PAT:
        required: true
      OPENAI_API_KEY:
        required: true

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: write

jobs:
  create-fix-pr:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.name == inputs.watched_workflow_name

    steps:
      - name: Checkout failed commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure Git
        shell: bash
        run: |
          git config user.name "codex-auto-fix"
          git config user.email "codex-auto-fix@users.noreply.github.com"

      - name: Collect failed CI logs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
        shell: bash
        run: |
          mkdir -p .codex-autofix
          gh run view "$FAILED_RUN_ID" --log-failed > .codex-autofix/failed-ci.log 2>&1 || true

      - name: Build Codex prompt
        env:
          BASE_BRANCH: ${{ inputs.base_branch }}
          FAILED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
          FAILED_WORKFLOW: ${{ github.event.workflow_run.name }}
          REVIEWER: ${{ inputs.reviewer }}
        shell: bash
        run: |
          cat > .codex-autofix/prompt.md <<EOF
          You are fixing a failed GitHub Actions CI run in this repository.

          Context:
          - Repository: ${{ github.repository }}
          - Workflow: $FAILED_WORKFLOW
          - Failed commit SHA: $FAILED_HEAD_SHA
          - Failed run URL: $FAILED_RUN_URL
          - Pull request target branch: $BASE_BRANCH
          - Human reviewer: @$REVIEWER
          - Failed log file: .codex-autofix/failed-ci.log

          Requirements:
          - Inspect the failed CI log and fix the root cause.
          - Keep the change minimal and scoped only to the CI failure.
          - Do not refactor unrelated code.
          - Do not create a branch, commit, push, or open a pull request; the workflow will do that after you finish.
          - Do not modify files under .codex-autofix.
          - Run the smallest relevant validation command when practical.
          - If you cannot make a safe code change, leave the working tree unchanged and explain why.
          EOF

      - name: Run Codex
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .codex-autofix/prompt.md
          output-file: .codex-autofix/codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--full-auto"]'

      - name: Create branch and pull request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          BRANCH_NAME: codex/auto-fix-${{ github.event.workflow_run.id }}
          FAILED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
          FAILED_WORKFLOW: ${{ github.event.workflow_run.name }}
          REVIEWER: ${{ inputs.reviewer }}
        shell: bash
        run: |
          cp .codex-autofix/codex-output.md "$RUNNER_TEMP/codex-output.md" 2>/dev/null || true
          rm -rf .codex-autofix

          if [ -z "$(git status --porcelain)" ]; then
            {
              echo "### Codex produced no changes"
              echo
              echo "Failed run: $FAILED_RUN_URL"
              echo
              cat "$RUNNER_TEMP/codex-output.md" 2>/dev/null || true
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          git checkout -B "$BRANCH_NAME"
          git add -A
          git commit -m "Fix failed CI via Codex"
          git push --force origin "HEAD:$BRANCH_NAME"

          cat > "$RUNNER_TEMP/pr-body.md" <<EOF
          Automated Codex fix for a failed CI run.

          - Failed workflow: \`$FAILED_WORKFLOW\`
          - Failed commit: \`$FAILED_HEAD_SHA\`
          - Failed run: $FAILED_RUN_URL
          - Target branch: \`$BASE_BRANCH\`
          - Reviewer: @$REVIEWER

          ## Codex output
          EOF
          cat "$RUNNER_TEMP/codex-output.md" >> "$RUNNER_TEMP/pr-body.md" 2>/dev/null || true

          if PR_URL=$(gh pr view "$BRANCH_NAME" --json url --jq .url 2>/dev/null); then
            gh pr edit "$BRANCH_NAME" --title "Codex auto-fix: $FAILED_WORKFLOW" --body-file "$RUNNER_TEMP/pr-body.md"
          else
            PR_URL=$(gh pr create \
              --base "$BASE_BRANCH" \
              --head "$BRANCH_NAME" \
              --title "Codex auto-fix: $FAILED_WORKFLOW" \
              --body-file "$RUNNER_TEMP/pr-body.md")
          fi

          PR_NUMBER=$(gh pr view "$BRANCH_NAME" --json number --jq .number)
          gh pr edit "$PR_NUMBER" --add-assignee "$REVIEWER" || true
          gh pr edit "$PR_NUMBER" --add-reviewer "$REVIEWER" || true

          echo "Created or updated PR: $PR_URL" >> "$GITHUB_STEP_SUMMARY"
