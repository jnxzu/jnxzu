name: Codex address requested changes

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      reviewer:
        required: true
        type: string
      review_url:
        required: true
        type: string
      review_body:
        required: false
        type: string
        default: ""
      head_branch:
        required: true
        type: string
      base_branch:
        required: true
        type: string
    secrets:
      GH_PAT:
        required: true
      OPENAI_API_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure Git
        shell: bash
        run: |
          git config user.name "codex-auto-fix"
          git config user.email "codex-auto-fix@users.noreply.github.com"

      - name: Collect PR context
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR_NUMBER: ${{ inputs.pr_number }}
        shell: bash
        run: |
          mkdir -p .codex-autofix
          gh pr view "$PR_NUMBER" --json title,body,comments,reviews,files,url,headRefName,baseRefName > .codex-autofix/pr-context.json
          gh pr diff "$PR_NUMBER" > .codex-autofix/pr.diff || true

      - name: Build Codex prompt
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          REVIEW_URL: ${{ inputs.review_url }}
          REVIEW_BODY: ${{ inputs.review_body }}
          REVIEWER: ${{ inputs.reviewer }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
        shell: bash
        run: |
          cat > .codex-autofix/prompt.md <<EOF
          You are updating an existing pull request after requested changes.

          Context:
          - Repository: ${{ github.repository }}
          - Pull request: #$PR_NUMBER
          - Head branch: $HEAD_BRANCH
          - Base branch: $BASE_BRANCH
          - Review URL: $REVIEW_URL
          - Reviewer: @$REVIEWER
          - PR context file: .codex-autofix/pr-context.json
          - Current PR diff file: .codex-autofix/pr.diff

          Review body:
          $REVIEW_BODY

          Requirements:
          - Address only the requested changes from the review.
          - Keep the follow-up minimal and scoped to review feedback.
          - Do not refactor unrelated code.
          - Do not create a branch, commit, push, or open a pull request; the workflow will push to the existing PR branch after you finish.
          - Do not modify files under .codex-autofix.
          - Run the smallest relevant validation command when practical.
          - If you cannot make a safe code change, leave the working tree unchanged and explain why.
          EOF

      - name: Run Codex
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .codex-autofix/prompt.md
          output-file: .codex-autofix/codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--full-auto"]'

      - name: Push follow-up commit
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
        shell: bash
        run: |
          cp .codex-autofix/codex-output.md "$RUNNER_TEMP/codex-output.md" 2>/dev/null || true
          rm -rf .codex-autofix

          if [ -z "$(git status --porcelain)" ]; then
            cat > "$RUNNER_TEMP/comment.md" <<EOF
          Codex ran for the requested changes, but produced no file changes.

          EOF
            cat "$RUNNER_TEMP/codex-output.md" >> "$RUNNER_TEMP/comment.md" 2>/dev/null || true
            gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/comment.md" || true
            exit 1
          fi

          git add -A
          git commit -m "Address requested changes via Codex"
          git push origin "HEAD:$HEAD_BRANCH"

          cat > "$RUNNER_TEMP/comment.md" <<EOF
          Codex pushed a follow-up commit addressing the requested changes.

          EOF
          cat "$RUNNER_TEMP/codex-output.md" >> "$RUNNER_TEMP/comment.md" 2>/dev/null || true
          gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/comment.md" || true
